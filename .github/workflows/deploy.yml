name: QLS Backend CI/CD

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x
  SOLUTION_FILE: QLS-Backend.sln
  DOCKERFILE: ./Dockerfile
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}
  DEFAULT_VPS_HOST: 180.93.114.25

jobs:
  test-build-push:
    name: Test, build, and push image
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'main' || 'dev' }}
    outputs:
      deploy_env: ${{ steps.branch.outputs.deploy_env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve branch target
        id: branch
        run: |
          set -e
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "deploy_env=main" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_env=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_FILE }}" --configuration Release --no-restore

      - name: Test
        run: dotnet test "${{ env.SOLUTION_FILE }}" --configuration Release --no-build --verbosity normal

      - name: Validate Docker image name
        run: |
          set -e
          if [ -z "$DOCKER_IMAGE" ]; then
            echo "Missing GitHub variable DOCKER_IMAGE. Example: your-dockerhub-username/your-image-name"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker tags
        id: tags
        run: |
          set -e
          BRANCH_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA}"
          {
            echo "tags<<EOF"
            echo "${DOCKER_IMAGE}:${BRANCH_TAG}"
            echo "${DOCKER_IMAGE}:${GITHUB_REF_NAME}-latest"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${DOCKER_IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  deploy-to-vps:
    name: Deploy to ${{ needs.test-build-push.outputs.deploy_env }} VPS
    needs: test-build-push
    runs-on: ubuntu-latest
    environment: ${{ needs.test-build-push.outputs.deploy_env }}

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST || env.DEFAULT_VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.yml
          target: /tmp/qls-deploy-${{ needs.test-build-push.outputs.deploy_env }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ vars.APP_DIR }}
          STACK_NAME: ${{ vars.STACK_NAME }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_BIND_IP: ${{ vars.POSTGRES_BIND_IP }}
          ASPNETCORE_ENVIRONMENT: ${{ vars.ASPNETCORE_ENVIRONMENT }}
          DB_NAME: ${{ vars.DB_NAME }}
          DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}
        with:
          host: ${{ secrets.VPS_HOST || env.DEFAULT_VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 120s
          command_timeout: 60m
          envs: APP_DIR,STACK_NAME,BACKEND_PORT,POSTGRES_PORT,POSTGRES_BIND_IP,ASPNETCORE_ENVIRONMENT,DB_NAME,DOCKER_IMAGE
          script: |
            set -e

            DEPLOY_ENV="${{ needs.test-build-push.outputs.deploy_env }}"

            if [ -z "$DOCKER_IMAGE" ]; then
              echo "Missing DOCKER_IMAGE variable."
              exit 1
            fi

            BACKEND_IMAGE="${DOCKER_IMAGE}:${{ github.ref_name }}-${{ github.sha }}"

            if [ -z "$APP_DIR" ]; then
              if [ "$DEPLOY_ENV" = "dev" ]; then
                APP_DIR="/root/qls-backend-dev"
              else
                APP_DIR="/root/qls-backend"
              fi
            fi

            STACK_NAME="${STACK_NAME:-qls-${DEPLOY_ENV}}"
            POSTGRES_BIND_IP="${POSTGRES_BIND_IP:-127.0.0.1}"

            if [ "$DEPLOY_ENV" = "dev" ]; then
              BACKEND_PORT="${BACKEND_PORT:-5079}"
              POSTGRES_PORT="${POSTGRES_PORT:-5433}"
              ASPNETCORE_ENVIRONMENT="${ASPNETCORE_ENVIRONMENT:-Development}"
              DB_NAME="${DB_NAME:-QLS_DEV}"
            else
              BACKEND_PORT="${BACKEND_PORT:-5078}"
              POSTGRES_PORT="${POSTGRES_PORT:-5432}"
              ASPNETCORE_ENVIRONMENT="${ASPNETCORE_ENVIRONMENT:-Production}"
              DB_NAME="${DB_NAME:-QLS_PROD}"
            fi

            mkdir -p "$APP_DIR"
            cp "/tmp/qls-deploy-${DEPLOY_ENV}/docker-compose.yml" "$APP_DIR/docker-compose.yml"
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              cat > .env <<EOF
            STACK_NAME=${STACK_NAME}
            ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
            BACKEND_PORT=${BACKEND_PORT}
            POSTGRES_PORT=${POSTGRES_PORT}
            POSTGRES_BIND_IP=${POSTGRES_BIND_IP}
            DB_NAME=${DB_NAME}
            DB_USER=qls_user
            DB_PASSWORD=change-this-db-password
            JWT_KEY=change-this-long-random-jwt-secret
            CORS_ORIGIN_0=http://localhost:5173
            CORS_ORIGIN_1=https://your-frontend-domain.com
            EOF
              echo "Created default .env. Update secrets in ${APP_DIR}/.env after first deploy."
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed. Installing Docker and Compose plugin..."
              apt-get update
              apt-get install -y ca-certificates curl gnupg lsb-release
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "Docker Compose plugin is not available."
              exit 1
            fi

            export BACKEND_IMAGE STACK_NAME BACKEND_PORT POSTGRES_PORT POSTGRES_BIND_IP ASPNETCORE_ENVIRONMENT DB_NAME
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            sleep 10

            if docker ps --filter "name=${STACK_NAME}-backend" --format '{{.Names}}' | grep -q "${STACK_NAME}-backend"; then
              echo "Deploy success: ${STACK_NAME}"
              docker ps --filter "name=${STACK_NAME}"
            else
              echo "Deploy failed: ${STACK_NAME}"
              docker logs "${STACK_NAME}-backend" --tail=100 || true
              exit 1
            fi

      - name: Health check
        env:
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          DEPLOY_ENV: ${{ needs.test-build-push.outputs.deploy_env }}
          VPS_HOST: ${{ secrets.VPS_HOST || env.DEFAULT_VPS_HOST }}
        run: |
          if [ -z "$BACKEND_PORT" ]; then
            if [ "$DEPLOY_ENV" = "dev" ]; then
              PORT="5079"
            else
              PORT="5078"
            fi
          else
            PORT="$BACKEND_PORT"
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${VPS_HOST}:${PORT}/health" || echo "000")
          echo "Health check: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi
