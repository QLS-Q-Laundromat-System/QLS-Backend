name: 🐳 Deploy QLS Backend (Docker) to Oracle Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build Docker & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. CHECKOUT ─────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─── 2. BUILD DOCKER IMAGE ───────────────────────────────────────────────
      - name: 🐳 Build Docker image
        run: |
          docker build -t qls-backend:latest .
          docker save qls-backend:latest | gzip > qls-backend.tar.gz
          echo "✅ Docker image built: $(du -sh qls-backend.tar.gz | cut -f1)"

      # ─── 3. COPY IMAGE LÊN SERVER ────────────────────────────────────────────
      - name: 📤 Copy image to Oracle Cloud VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "qls-backend.tar.gz,docker-compose.yml"
          target: "/tmp/qls-deploy"

      # ─── 4. DEPLOY TRÊN SERVER ───────────────────────────────────────────────
      - name: 🚀 Deploy Docker containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e

            echo "📦 Load Docker image..."
            docker load < /tmp/qls-deploy/qls-backend.tar.gz
            echo "✅ Image loaded"

            echo "📂 Copy docker-compose.yml..."
            cp /tmp/qls-deploy/docker-compose.yml ~/qls-backend/docker-compose.yml

            echo "🔄 Restart containers..."
            cd ~/qls-backend
            docker compose up -d --remove-orphans

            echo "🧹 Cleanup temp files..."
            rm -rf /tmp/qls-deploy

            echo "⏳ Chờ container khởi động..."
            sleep 10

            # Kiểm tra container
            if docker ps | grep -q "qls-backend"; then
              echo "✅ CONTAINER ĐANG CHẠY!"
              docker ps --filter "name=qls"
            else
              echo "❌ CONTAINER LỖI! Xem logs:"
              docker logs qls-backend --tail=50
              exit 1
            fi

      # ─── 5. HEALTH CHECK ─────────────────────────────────────────────────────
      - name: 🏥 Health Check
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.ORACLE_HOST }}:5078/health || echo "000")
          echo "Health check: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ API hoạt động bình thường!"
          else
            echo "⚠️ Health check trả về code $HTTP_CODE (có thể /health chưa được implement)"
          fi
